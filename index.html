<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liar's Shot</title>
  <!-- Google Fonts (optionnel, selon le style du jeu) -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body { background: #0c0a08; color: #e8dcc8; font-family: 'Press Start 2P', monospace; margin: 0; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <!-- React et ReactDOM via CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- Babel pour JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Ton composant -->
  <script type="text/babel" src="liars-shot.jsx"></script>
  <script type="text/babel">
    // window.LiarsShot est défini par liars-shot.jsx
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<window.LiarsShot />);
  </script>
</body>
</html>
